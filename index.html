<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Watch live sailing events, yacht races, and real-time boat feeds on Sail Monitor. Stay connected to the thrill of the sea with curated YouTube streams from around the world.">
  <meta name="author" content="Michael Crump | MEC Designs LLC - PixelBenderz - aiminds.io">
  <title>Sail Monitor | Live Sailing Video Streaming Services</title>

  <!-- Bootstrap core CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" 
        crossorigin="anonymous">

  <link rel="icon" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/favicon.ico">

  <!-- jQuery (required for YTPlayer) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- YouTube Iframe API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- YTPlayer Plugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/jquery.mb.YTPlayer.min.js"></script>

  <meta name="theme-color" content="#7952b3">

  <style>
    body { background-color:#111; color:white; }
    .bd-placeholder-img { font-size: 1.125rem; text-anchor: middle; -webkit-user-select: none; -moz-user-select: none; user-select: none; }
    @media (min-width: 768px) { .bd-placeholder-img-lg { font-size: 3.5rem; } }

    /* ---------------- Shimmer Loaders ---------------- */
    .loader {
      height: 200px;
      width: 100%;
      background: linear-gradient(90deg, #444 25%, #666 50%, #444 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    .loader-text {
      height: 20px;
      width: 70%;
      background: linear-gradient(90deg, #444 25%, #666 50%, #444 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .loader-video {
      height: 0;
      padding-bottom: 56.25%;
      position: relative;
    }
    .loader-video .loader { position: absolute; top: 0; left: 0; right:0; bottom:0; }

    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    /* ---------------- Stream Card Hover ---------------- */
    .card {
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    /* Featured video container */
    #classic-mara-live .ratio {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      margin-bottom: 1rem;
    }
  </style>

</head>
<body>
  <!-- Featured Video Background -->
  <a id="bgndVideo" class="player"
     data-property='{
       "videoURL":"-a2YujbY3_Q",
       "containment":"body",
       "autoPlay":true,
       "mute":true,
       "startAt":0,
       "opacity":1,
       "showControls":false,
       "loop":true,
       "quality":"hd1080"
     }'>
  </a>  

  <!-- Header -->
  <header class="site-header sticky-top py-1">
    <nav class="container d-flex flex-column flex-md-row justify-content-between">
      <a class="py-2" href="#" aria-label="Product">
        <img src="sail-monitor-logo.png" alt="sail-monitor" />
      </a>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <div class="container my-4">

      <h1 class="display-8 fw-normal text-white">Sail Monitor</h1>

      <!-- FEATURED STREAM -->
      <div id="classic-mara-live" class="mb-5 position-relative">
        <div class="loader-text loader mb-2"></div>
        <div class="loader-video"><div class="loader"></div></div>
        <button id="featured-volume-btn" class="btn btn-sm btn-light position-absolute top-0 end-0 m-2" style="z-index:10; display:none;">🔇</button>
      </div>

      <!-- OTHER STREAMS GRID -->
      <div id="streams" class="row g-4">
        <div class="col-xs-12 col-md-6">
          <div class="loader-text loader mb-2"></div>
          <div class="loader-video"><div class="loader"></div></div>
        </div>
        <div class="col-xs-12 col-md-6">
          <div class="loader-text loader mb-2"></div>
          <div class="loader-video"><div class="loader"></div></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="container py-5 text-white">
    <div class="row">
      <div class="col-xs-6 col-md-3">
        <img src="sail-monitor-logo.png" alt="sail-monitor" />
        <small class="d-block mb-3 text-muted">© SailMonitor 2026</small>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
          crossorigin="anonymous"></script>

  <!-- Initialize Background Video -->
  <script>
    $(document).ready(function () {
        $("#bgndVideo").YTPlayer();
    });
  </script>

  <!-- Fetch Streams & Featured -->
  <script>
  async function fetchFeeds() {
    const featuredContainer = document.getElementById("classic-mara-live");
    const streamsContainer = document.getElementById("streams");
    const volumeBtn = document.getElementById("featured-volume-btn");

    featuredContainer.innerHTML = `<div class="loader-text loader mb-2"></div><div class="loader-video"><div class="loader"></div></div>`;
    volumeBtn.style.display = "none";
    streamsContainer.innerHTML = `
      <div class="row g-4">
        <div class="col-xs-12 col-md-6">
          <div class="loader-text loader mb-2"></div>
          <div class="loader-video"><div class="loader"></div></div>
        </div>
        <div class="col-xs-12 col-md-6">
          <div class="loader-text loader mb-2"></div>
          <div class="loader-video"><div class="loader"></div></div>
        </div>
      </div>
    `;

    try {
      const [featuredResp, streamsResp] = await Promise.all([
        fetch("https://api.sailmonitor.online/featured"),
        fetch("https://api.sailmonitor.online/streams")
      ]);

      const featured = await featuredResp.json();
      const streamsData = await streamsResp.json();
      const streams = streamsData.streams || [];

      // ---------------- FEATURED ----------------
      if (featured && featured.video_id) {
        const viewers = featured.concurrent_viewers ? parseInt(featured.concurrent_viewers).toLocaleString() : "0";
        featuredContainer.innerHTML = `
          <h2 class="display-5">Classic Mara Live</h2>
          <p>🔴 ${viewers} watching</p>
          <div class="ratio ratio-16x9 mb-3">
            <iframe id="featured-iframe" src="https://www.youtube.com/embed/${featured.video_id}?autoplay=1&mute=1&rel=0&modestbranding=1" allow="autoplay" allowfullscreen loading="lazy"></iframe>
          </div>
        `;
        // Volume toggle
        volumeBtn.style.display = "inline-block";
        let muted = true;
        volumeBtn.textContent = "🔇";
        volumeBtn.onclick = () => {
          muted = !muted;
          const src = `https://www.youtube.com/embed/${featured.video_id}?autoplay=1&rel=0&modestbranding=1&${muted ? "mute=1" : "mute=0"}`;
          document.getElementById("featured-iframe").src = src;
          volumeBtn.textContent = muted ? "🔇" : "🔊";
        };
      } else {
        featuredContainer.innerHTML = `<h2 class="display-5">Classic Mara</h2><p>Currently Offline</p>`;
        volumeBtn.style.display = "none";
      }

      // ---------------- OTHER STREAMS ----------------
      streamsContainer.innerHTML = "";
      if (!streams.length) {
        streamsContainer.innerHTML = "<p>No additional sailing streams live.</p>";
      } else {
        streams.forEach(stream => {
          const viewers = stream.concurrent_viewers ? parseInt(stream.concurrent_viewers).toLocaleString() : "0";
          const col = document.createElement("div");
          col.className = "col-xs-12 col-md-6";
          col.innerHTML = `
            <div class="card bg-dark text-white h-100 shadow-sm">
              <div class="ratio ratio-16x9">
                <iframe src="https://www.youtube.com/embed/${stream.video_id}" allowfullscreen loading="lazy"></iframe>
              </div>
              <div class="card-body">
                <h5 class="card-title">${stream.title}</h5>
                <p class="card-text"><strong>${stream.channel}</strong></p>
                <p class="card-text">🔴 ${viewers} watching</p>
              </div>
            </div>
          `;
          streamsContainer.appendChild(col);
        });
      }

    } catch (err) {
      console.error("Error fetching streams:", err);
      featuredContainer.innerHTML = "<p>Error loading featured stream.</p>";
      streamsContainer.innerHTML = "<p>Error loading streams.</p>";
    }
  }

  // Initial fetch + refresh every 5 min
  fetchFeeds();
  setInterval(fetchFeeds, 300000);
  </script>

</body>
</html>
