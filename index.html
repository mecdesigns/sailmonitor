<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Watch live sailing events, yacht races, and real-time boat feeds on Sail Monitor.">
  <meta name="author" content="Michael Crump">
  <title>Sail Monitor | Live Sailing Video Streaming</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/jquery.mb.YTPlayer.min.js"></script>
  <link href="product.css" rel="stylesheet">
  <style>
    body { background-color:#111; color:white; }

    .loader {
      height: 200px;
      width: 100%;
      background: linear-gradient(90deg, #444 25%, #666 50%, #444 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    .loader-text {
      height: 20px;
      width: 70%;
      background: linear-gradient(90deg, #444 25%, #666 50%, #444 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .loader-video {
      height: 0;
      padding-bottom: 56.25%;
      position: relative;
    }

    .loader-video .loader {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .card {
      transition: transform .3s, box-shadow .3s;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0,0,0,.5);
    }
  </style>
</head>

<body>

<!-- Background Video -->
<a id="bgndVideo" class="player"
   data-property='{
     "videoURL":"-a2YujbY3_Q",
     "containment":"body",
     "autoPlay":true,
     "mute":true,
     "startAt":0,
     "opacity":1,
     "showControls":false,
     "loop":true,
     "quality":"hd1080"
   }'>
</a>

  <!-- Header -->
  <header class="site-header sticky-top py-1">
    <nav class="container d-flex flex-column flex-md-row justify-content-between">
      <a class="py-2" href="#" aria-label="Product">
        <img src="sail-monitor-logo.png" alt="sail-monitor" />
      </a>
    </nav>
  </header>

<main class="container my-4">
  <div class="row">
    <h2>Featured Video</h2>
    <div class="col-xs-12 col-md-6">
      <!-- STATIC FEATURED (temporary) -->
      <div id="classic-mara-live" class="mb-5">
        <div class="ratio ratio-16x9 mb-3"></div>
      </div>
    </div>
    <div class="col-xs-12 col-md-6">
      <p>Mara Live Tracking - <a href="https://www.predictwind.com/tracking/ShowGirl?tab=boat" class="text-white">Predict Wind</a> Navigation</p>
      <div class="ratio ratio-16x9">
        <iframe  
              src="https://www.predictwind.com/tracking/ShowGirl?tab=boat" 
              width="100%" 
              height="250" 
              frameborder="0"
              allowfullscreen>
          </iframe>
      </div>
    </div>
    <div class="col-12">
      <p><img src="star-link.png" style="width:175px;height:auto;" alt="starlink" /><span style="size:32px;">STARLINK COVERAGE MAP</span></p>
      <img src="Starlink-tracking-map2.jpg" style="width:100%;height:auto;"alt="starlink" />
    </div>
  </div>
  <!-- STREAMS GRID -->
  <div id="streams" class="row g-4">
    <div class="col-md-6">
      <div class="loader-text loader"></div>
      <div class="loader-video"><div class="loader"></div></div>
    </div>
    <div class="col-md-6">
      <div class="loader-text loader"></div>
      <div class="loader-video"><div class="loader"></div></div>
    </div>
  </div>

</main>

<footer class="container py-4">
  <small>© SailMonitor 2026</small>
</footer>

<script>
$(document).ready(function () {
  $("#bgndVideo").YTPlayer();
});

async function fetchFeeds() {

  const featuredContainer = document.getElementById("classic-mara-live");
  const volumeBtn = document.getElementById("featured-volume-btn");
  const streamsContainer = document.getElementById("streams");

  // Safe loader reset
  if (streamsContainer) {
    streamsContainer.innerHTML = `
      <div class="col-md-6">
        <div class="loader-text loader"></div>
        <div class="loader-video"><div class="loader"></div></div>
      </div>
      <div class="col-md-6">
        <div class="loader-text loader"></div>
        <div class="loader-video"><div class="loader"></div></div>
      </div>
    `;
  }

  try {

    const streamsResp = await fetch("https://api.sailmonitor.online/streams");
    const streamsData = await streamsResp.json();
    const streams = streamsData.streams || [];

    // FEATURED SAFE CHECK (will not crash if missing)
    if (featuredContainer && streamsData.featured) {
      const f = streamsData.featured;
      featuredContainer.innerHTML = `
        <h3>Norwegian Girl Sailing Across the Atlantic Ocean</h3>
        <div class="ratio ratio-16x9 mb-3">
          <iframe src="https://www.youtube.com/embed/${f.video_id}?autoplay=1&mute=1"
                  allowfullscreen></iframe>
        </div>
      `;
      if (volumeBtn) volumeBtn.style.display = "inline-block";
    }

    // STREAMS RENDER
    if (!streamsContainer) return;

    streamsContainer.innerHTML = "";

    if (!streams.length) {
      streamsContainer.innerHTML = "<p>No additional sailing streams live.</p>";
      return;
    }

    streams
      .sort((a,b) => (b.concurrent_viewers || 0) - (a.concurrent_viewers || 0))
      .forEach(stream => {

        const viewers = stream.concurrent_viewers
          ? parseInt(stream.concurrent_viewers).toLocaleString()
          : "0";

        const col = document.createElement("div");
        col.className = "col-xs12 col-md-6";

        col.innerHTML = `
          <div class="card bg-dark text-white h-100">
            <div class="ratio ratio-16x9">
              <iframe src="https://www.youtube.com/embed/${stream.video_id}"
                      loading="lazy"
                      allowfullscreen></iframe>
            </div>
            <div class="card-body">
              <h5>${stream.title}</h5>
              <p><strong>${stream.channel}</strong></p>
              <p>🔴 ${viewers} watching</p>
            </div>
          </div>
        `;

        streamsContainer.appendChild(col);
      });

  } catch (err) {
    console.error("Error fetching streams:", err);
    if (streamsContainer) {
      streamsContainer.innerHTML = "<p>Error loading streams.</p>";
    }
  }
}

// Initial load + refresh every 5 minutes
fetchFeeds();
setInterval(fetchFeeds, 300000);

</script>

</body>
</html>
